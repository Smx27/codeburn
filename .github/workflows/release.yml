name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux
            arch: x64
            os: ubuntu-latest
          - platform: linux
            arch: arm64
            os: ubuntu-latest
          - platform: darwin
            arch: arm64
            os: macos-latest
          - platform: darwin
            arch: x64
            os: macos-latest
          - platform: win32
            arch: x64
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build SEA (non-Windows)
        if: matrix.platform != 'win32'
        run: npm run build:sea
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}

      - name: Build SEA (Windows)
        if: matrix.platform == 'win32'
        run: npm run build:sea:windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: niriksh-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/niriksh-*
            dist/niriksh.exe
            dist/SHA256SUMS

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum niriksh-* niriksh.exe 2>/dev/null > SHA256SUMS || sha256sum niriksh-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/niriksh-*
            artifacts/niriksh.exe
            artifacts/SHA256SUMS

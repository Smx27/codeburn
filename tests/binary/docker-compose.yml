services:
  ubuntu:
    build:
      context: .
      dockerfile: docker/ubuntu.Dockerfile
    working_dir: /workspace
    volumes:
      - ../../dist/niriksh-linux-x64:/artifacts/niriksh-linux-x64:ro
      - ../../dist/SHA256SUMS:/artifacts/SHA256SUMS:ro
    environment:
      NIRIKSH_BINARY_PATH: /artifacts/niriksh-linux-x64
      NIRIKSH_SHA_PATH: /artifacts/SHA256SUMS

  debian:
    build:
      context: .
      dockerfile: docker/debian.Dockerfile
    working_dir: /workspace
    volumes:
      - ../../dist/niriksh-linux-x64:/artifacts/niriksh-linux-x64:ro
      - ../../dist/SHA256SUMS:/artifacts/SHA256SUMS:ro
    environment:
      NIRIKSH_BINARY_PATH: /artifacts/niriksh-linux-x64
      NIRIKSH_SHA_PATH: /artifacts/SHA256SUMS

  alpine:
    build:
      context: .
      dockerfile: docker/alpine.Dockerfile
    working_dir: /workspace
    volumes:
      - ../../dist/niriksh-linux-x64:/artifacts/niriksh-linux-x64:ro
      - ../../dist/SHA256SUMS:/artifacts/SHA256SUMS:ro
    environment:
      NIRIKSH_BINARY_PATH: /artifacts/niriksh-linux-x64
      NIRIKSH_SHA_PATH: /artifacts/SHA256SUMS

  fedora:
    build:
      context: .
      dockerfile: docker/fedora.Dockerfile
    working_dir: /workspace
    volumes:
      - ../../dist/niriksh-linux-x64:/artifacts/niriksh-linux-x64:ro
      - ../../dist/SHA256SUMS:/artifacts/SHA256SUMS:ro
    environment:
      NIRIKSH_BINARY_PATH: /artifacts/niriksh-linux-x64
      NIRIKSH_SHA_PATH: /artifacts/SHA256SUMS
